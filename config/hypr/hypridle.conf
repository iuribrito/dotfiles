general {
    lock_cmd = pidof hyprlock || hyprlock       # comando para bloquear a tela
    before_sleep_cmd = loginctl lock-session    # bloquear antes de suspender
    after_sleep_cmd = hyprctl dispatch dpms on  # ligar a tela ao voltar da suspensão
}

listener {
    timeout = 60                                
    on-timeout = brightnessctl -s set 10 
    on-resume = brightnessctl -r
}

listener {
    timeout = 300                                
    on-timeout = loginctl lock-session           
}

listener {
    timeout = 150                                
    on-timeout = hyprctl dispatch dpms off       
    on-resume = hyprctl dispatch dpms on         
}

